<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jukebox</title>
  <link rel="icon" href="/favicon-32x32.png?v=20260720-1" type="image/png" sizes="32x32"><link rel="shortcut icon" href="/favicon.ico?v=20260720-1"><link rel="apple-touch-icon" href="/apple-touch-icon.png?v=20260720-1" sizes="180x180">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #0b0b0b;
      --panel-2: #101010;
      --panel-3: #161616;
      --line: #282828;
      --line-2: #3a3a3a;
      --text: #f4f4f4;
      --muted: #9b9b9b;
      --soft: #c9c9c9;
      --accent: #f1c75b;
      --bad: #ff7474;
      --good: #8be28f;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input {
      font: inherit;
      color: inherit;
    }

    button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #111;
      padding: 0 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      border-color: var(--line-2);
      background: #191919;
    }

    button.primary {
      border-color: #6f5b25;
      background: #201a0b;
      color: var(--accent);
    }

    button.danger { color: var(--bad); }

    button:disabled {
      opacity: .38;
      cursor: default;
    }

    input[type="range"] {
      width: 110px;
      accent-color: var(--accent);
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 50px 46px 1fr 30px;
      background: var(--bg);
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #070707;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0;
      color: #fff;
    }

    .crumbs {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      white-space: nowrap;
    }

    .crumb {
      border: 1px solid transparent;
      background: transparent;
      color: var(--soft);
      height: 30px;
      padding: 0 5px;
    }

    .crumb:hover {
      border-color: var(--line);
      background: #101010;
    }

    .slash {
      color: #666;
      flex: 0 0 auto;
    }

    .now-line {
      max-width: 36vw;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
      background: #0a0a0a;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .sep {
      width: 1px;
      align-self: stretch;
      background: var(--line);
      margin: 0 2px;
      flex: 0 0 auto;
    }

    .volume {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-rows: 48px 1fr;
      background: var(--panel);
    }

    .folder-head {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .folder-title {
      min-width: 0;
      font-size: 17px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-title-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .folder-cover {
      width: 30px;
      height: 30px;
      object-fit: cover;
      image-rendering: pixelated;
      border: 1px solid var(--line-2);
      flex: 0 0 auto;
    }

    .folder-cover[hidden] {
      display: none;
    }

    .folder-hint {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table-wrap {
      position: relative;
      min-height: 0;
      overflow: auto;
      background: #080808;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }

    th, td {
      height: 38px;
      border-bottom: 1px solid #191919;
      padding: 0 10px;
      text-align: left;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      height: 32px;
      background: #0d0d0d;
      color: #8f8f8f;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
      border-bottom-color: var(--line);
    }

    th:first-child, td:first-child { width: 38px; }
    th:nth-child(2), td:nth-child(2) { width: auto; }
    th:nth-child(3), td:nth-child(3) { width: 120px; }
    th:nth-child(4), td:nth-child(4) { width: 120px; }
    th:nth-child(5), td:nth-child(5) { width: 150px; }

    tr[data-open], tr[data-track-row] {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #121212;
    }

    tbody tr.selected {
      background: #19150b;
      outline: 1px solid #4a3b17;
      outline-offset: -1px;
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .glyph {
      width: 58px;
      color: var(--accent);
      font-size: 11px;
      flex: 0 0 auto;
    }

    .cover-thumb {
      width: 24px;
      height: 24px;
      object-fit: cover;
      image-rendering: pixelated;
      border: 1px solid var(--line-2);
      flex: 0 0 auto;
    }

    .name-stack {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .name-stack strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      color: #f2f2f2;
    }

    .name-stack small {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 11px;
    }

    .empty {
      position: absolute;
      inset: 46px 0 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    .empty[hidden] {
      display: none;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border-top: 1px solid var(--line);
      background: #070707;
      color: var(--muted);
      font-size: 12px;
    }

    .statusbar span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #storageText {
      color: var(--soft);
      flex: 1;
      text-align: center;
    }

    .drop-target::after {
      content: "";
      pointer-events: none;
      position: fixed;
      inset: 97px 10px 38px;
      border: 1px dashed transparent;
      border-radius: 5px;
    }

    body.dragging .drop-target::after {
      border-color: var(--accent);
      background: rgba(241, 199, 91, .05);
    }

    #fileInput {
      display: none;
    }

    @media (max-width: 640px) {
      .app {
        grid-template-rows: 50px 46px 1fr 30px;
      }

      .topbar {
        gap: 10px;
        padding: 0 10px;
      }

      .now-line {
        display: none;
      }

      th:nth-child(3), td:nth-child(3),
      th:nth-child(5), td:nth-child(5) {
        display: none;
      }

      th:nth-child(4), td:nth-child(4) {
        width: 76px;
      }

      .glyph {
        display: none;
      }

      .name-stack small {
        display: none;
      }
    }

    /* Jukebox library skin */
    :root {
      --bg: #050607;
      --panel: #0b0d0f;
      --panel-2: #111418;
      --panel-3: #171b20;
      --line: #20262d;
      --line-2: #303943;
      --text: #f6f3eb;
      --muted: #8f9aa5;
      --soft: #cbd4dc;
      --accent: #c084fc;
      --accent-2: #f1c75b;
      --bad: #ff7474;
      --good: #9ee493;
      --glow: rgba(192, 132, 252, .18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 20% -10%, rgba(192, 132, 252, .12), transparent 28%),
        radial-gradient(circle at 90% 0%, rgba(241, 199, 91, .10), transparent 26%),
        var(--bg);
    }

    button {
      border-radius: 999px;
      border-color: var(--line);
      background: #11161b;
      font-weight: 700;
      letter-spacing: 0;
    }

    button:hover:not(:disabled) {
      background: #182029;
      border-color: #40505f;
      transform: translateY(-1px);
    }

    button.primary {
      border-color: rgba(192, 132, 252, .48);
      background: linear-gradient(180deg, #14303c, #0e2028);
      color: #f3e8ff;
      box-shadow: 0 0 0 1px rgba(192, 132, 252, .08), 0 8px 24px rgba(0, 0, 0, .22);
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr 34px;
      background: transparent;
    }

    .topbar {
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      background: rgba(5, 6, 7, .82);
      backdrop-filter: blur(18px);
      padding: 0 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 0;
      background: transparent;
      padding: 0;
      font-size: 17px;
      color: var(--text);
    }

    .brand:hover:not(:disabled) {
      background: transparent;
      transform: none;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(192, 132, 252, .36);
      background: #081118;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      image-rendering: pixelated;
      box-shadow: inset 0 0 18px rgba(192, 132, 252, .08);
    }

    .search-pill {
      height: 36px;
      min-width: 220px;
      max-width: 420px;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #0c1014;
      font-size: 13px;
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 270px 1fr;
      gap: 10px;
      padding: 10px;
    }

    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 16px;
      background: rgba(9, 12, 15, .92);
      padding: 12px;
      overflow: hidden;
    }

    .nav-stack {
      display: grid;
      gap: 8px;
    }

    .nav-chip {
      width: 100%;
      justify-content: flex-start;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 42px;
      border-radius: 10px;
      background: transparent;
      color: var(--soft);
      text-align: left;
    }

    .nav-chip.active {
      background: #151b21;
      border-color: #2e3944;
      color: #fff;
    }

    .sidebar-title {
      margin: 6px 4px 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .playlist-rail {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 6px;
      padding-right: 2px;
    }

    .playlist-mini {
      min-width: 0;
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 4px;
      background: transparent;
      color: var(--soft);
      cursor: pointer;
    }

    .playlist-mini:hover {
      border-color: var(--line);
      background: #10161b;
    }

    .playlist-mini img,
    .playlist-mini .mini-fallback {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      image-rendering: pixelated;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #080b0e;
    }

    .playlist-mini strong,
    .playlist-mini span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .playlist-mini span {
      color: var(--muted);
      font-size: 12px;
    }

    .main-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(21, 27, 33, .94), rgba(9, 11, 14, .96) 260px);
      overflow: hidden;
    }

    .hero {
      min-width: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 18px;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .crumbs {
      margin-bottom: 10px;
      flex: none;
      display: flex;
      gap: 6px;
    }

    .crumb {
      height: 26px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .04);
      color: var(--muted);
      font-size: 12px;
    }

    .hero h1 {
      margin: 0;
      min-width: 0;
      color: #fff;
      font-size: clamp(32px, 5vw, 66px);
      line-height: .95;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 760px;
      color: var(--soft);
      font-size: 14px;
    }

    .folder-cover {
      width: clamp(84px, 12vw, 150px);
      height: clamp(84px, 12vw, 150px);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .48);
      background: #080b0e;
    }

    .toolbar {
      min-height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      background: rgba(5, 6, 7, .36);
      flex-wrap: wrap;
      overflow: visible;
    }

    .content-scroll {
      position: relative;
      min-height: 0;
      overflow: auto;
      padding: 18px;
    }

    .library-grid {
      display: grid;
      gap: 26px;
    }

    .section-block {
      display: grid;
      gap: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
      color: #fff;
    }

    .section-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .empty-inline {
      min-height: 120px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(255, 255, 255, .10);
      border-radius: 14px;
      color: var(--muted);
      background: rgba(7, 9, 11, .44);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
      gap: 14px;
    }

    .media-card {
      position: relative;
      min-width: 0;
      display: grid;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 14px;
      background: rgba(17, 21, 25, .78);
      padding: 12px;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .media-card:hover {
      transform: translateY(-2px);
      border-color: rgba(192, 132, 252, .34);
      background: rgba(22, 29, 36, .92);
    }

    .media-card.selected {
      border-color: rgba(241, 199, 91, .54);
      box-shadow: inset 0 0 0 1px rgba(241, 199, 91, .18);
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, .08);
      object-fit: cover;
      image-rendering: pixelated;
      background: #07090b;
      box-shadow: 0 18px 38px rgba(0, 0, 0, .34);
    }

    .card-fallback {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 10px;
      border: 1px solid rgba(192, 132, 252, .18);
      background:
        linear-gradient(135deg, rgba(192, 132, 252, .12), rgba(241, 199, 91, .08)),
        #07090b;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 28px;
    }

    .card-title,
    .track-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #fff;
      font-weight: 800;
    }

    .card-meta,
    .track-meta {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .card-check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent-2);
    }

    .track-list {
      display: grid;
      gap: 6px;
    }

    .track-row {
      min-width: 0;
      display: grid;
      grid-template-columns: 34px 44px 1fr 100px 92px;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 6px 10px;
      background: rgba(8, 11, 14, .54);
      cursor: pointer;
    }

    .track-row:hover {
      background: rgba(20, 26, 32, .94);
      border-color: rgba(255, 255, 255, .06);
    }

    .track-row.selected {
      border-color: rgba(241, 199, 91, .45);
      background: rgba(35, 28, 11, .45);
    }

    .track-cover {
      width: 38px;
      height: 38px;
      border-radius: 7px;
      object-fit: cover;
      image-rendering: pixelated;
      border: 1px solid var(--line);
      background: #07090b;
    }

    .track-kind,
    .track-size {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .empty {
      inset: 18px;
      border: 1px dashed rgba(255, 255, 255, .10);
      border-radius: 14px;
      background: rgba(7, 9, 11, .72);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, .62);
      backdrop-filter: blur(8px);
      padding: 18px;
    }

    .modal[hidden] {
      display: none;
    }

    .modal-card {
      width: min(420px, 100%);
      display: grid;
      gap: 16px;
      border: 1px solid rgba(192, 132, 252, .22);
      border-radius: 16px;
      background: #0b0f13;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .55);
      padding: 18px;
    }

    .modal-card h2 {
      margin: 0;
      color: #fff;
      font-size: 22px;
    }

    .modal-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .modal-card input[type="text"] {
      height: 44px;
      border: 1px solid var(--line-2);
      border-radius: 10px;
      background: #07090b;
      color: #fff;
      padding: 0 12px;
      outline: none;
    }

    .modal-card input[type="text"]:focus {
      border-color: rgba(192, 132, 252, .64);
      box-shadow: 0 0 0 3px rgba(192, 132, 252, .12);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .statusbar {
      border-top: 1px solid rgba(255, 255, 255, .06);
      background: rgba(5, 6, 7, .88);
    }

    .drop-target::after {
      inset: 68px 12px 44px;
      border-radius: 16px;
    }

    body.dragging .drop-target::after {
      border-color: var(--accent);
      background: rgba(192, 132, 252, .08);
      box-shadow: inset 0 0 40px rgba(192, 132, 252, .08);
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { grid-template-rows: auto auto; }
      .playlist-rail { max-height: 170px; }
      .hero { grid-template-columns: 1fr; }
      .folder-cover { width: 96px; height: 96px; }
      .track-row { grid-template-columns: 30px 40px 1fr 72px; }
      .track-kind { display: none; }
    }

    @media (max-width: 620px) {
      .topbar { gap: 10px; }
      .search-pill { display: none; }
      .layout { padding: 6px; }
      .hero { padding: 18px; }
      .content-scroll { padding: 12px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); }
      .track-row { grid-template-columns: 28px 1fr 58px; }
      .track-cover { display: none; }
      .track-size { font-size: 11px; }
    }

    /* Final consumer-app pass */
    :root {
      --bg: #050506;
      --panel: #0a0b0d;
      --panel-2: #101214;
      --panel-3: #17191c;
      --line: #202327;
      --line-2: #33383f;
      --text: #f5f5f3;
      --muted: #8b929a;
      --soft: #c9cdd2;
      --accent: #c084fc;
      --accent-2: #e9d5ff;
      --bad: #ff7b7b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #050506;
      color: var(--text);
    }

    button {
      height: 32px;
      border-radius: 8px;
      border: 1px solid #24282d;
      background: #111316;
      color: var(--soft);
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: none;
      transition: background .12s ease, border-color .12s ease, color .12s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    button:hover:not(:disabled) {
      transform: none;
      border-color: #3a414a;
      background: #181b1f;
      color: #fff;
    }

    button.primary {
      border-color: #63488a;
      background: #21162f;
      color: #f3e8ff;
      box-shadow: none;
    }

    .icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .app {
      grid-template-rows: 56px 1fr 32px;
      background: #050506;
      width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .topbar {
      min-width: 0;
      gap: 18px;
      padding: 0 20px;
      border-bottom: 1px solid #15181b;
      background: #070809;
      backdrop-filter: none;
    }

    .brand {
      height: 40px;
      flex: 0 0 auto;
      font-size: 16px;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border-color: #5b3b7e;
      background: linear-gradient(180deg, #231333, #140b20);
      color: var(--accent);
      box-shadow: none;
    }

    .brand-mark .icon {

      height: 18px;
      stroke-width: 2;
    }

    .top-nav {

      gap: 6px;
      flex: 1;
      overflow-x: auto;

    }

    .top-nav::-webkit-scrollbar {

    .top-nav-pill {
      height: 34px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .top-nav-pill.active {
      background: #1a1224;
      border-color: #3b2754;
      color: #fff;
    }

    .now-line {
      max-width: 280px;
      font-size: 13px;
      color: var(--muted);
    }

    .layout {
      min-height: 0;
      min-width: 0;
      width: 100%;
      overflow: hidden;
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 0;
      padding: 0;
      background: #050506;
    }

    .sidebar {

      border-right: 1px solid #15181b;
      border-radius: 0;
      background: #08090b;
      padding: 16px 12px;
    }

    .nav-chip {

      border-radius: 8px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .nav-chip.active,
    .nav-chip:hover:not(:disabled) {
      background: #18111f;
      border-color: #3a294d;
      color: #fff;
    }

    .sidebar-title {
      margin-top: 12px;
      color: #6f7882;
    }

    .playlist-mini {
      min-height: 42px;
      border-radius: 8px;
      color: var(--soft);
    }

    .playlist-mini:hover {
      background: #111417;
    }

    .playlist-mini img,
    .playlist-mini .mini-fallback {
      border-radius: 6px;
    }

    .main-panel {
      min-width: 0;
      border: 0;
      border-radius: 0;
      background: #090a0c;
    }

    .hero {
      min-width: 0;
      min-height: 158px;
      grid-template-columns: 1fr auto;
      align-items: end;
      padding: 26px 32px 22px;
      border-bottom: 1px solid #15181b;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, 0)),

    .crumbs {

      gap: 5px;
    }

    .crumb {

      border-radius: 8px;
      background: #111417;
      color: #9aa2aa;
      font-size: 12px;
    }

    .slash {
      align-self: center;
      color: #434a51;
    }

    .hero h1 {
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      margin-top: 10px;
      color: #a2aab2;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .folder-cover {
      width: 116px;
      height: 116px;
      border-radius: 8px;
      border-color: #252a30;
      box-shadow: 0 18px 46px rgba(0, 0, 0, .42);
    }

    .toolbar {
      min-width: 0;
      min-height: 54px;
      padding: 10px 20px;
      gap: 8px;

      overflow: visible;
      border-bottom: 1px solid #15181b;
      background: #090a0c;

    .sep {
      background: #202327;
      margin: 0 2px;
    }

    .volume {
      height: 32px;
      color: var(--muted);
      font-size: 13px;
    }

    .content-scroll {
      min-width: 0;
      padding: 22px 28px 34px;
      background: #090a0c;
    }

    .library-grid {
      min-width: 0;
      gap: 30px;
    }

    .section-block {
      gap: 14px;
    }

    .section-head h2 {
      font-size: 20px;
      letter-spacing: 0;
    }

    .section-head span {
      color: #747d86;
    }

    .card-grid {
      grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
      gap: 18px;
    }

    .media-card {
      border: 0;
      border-radius: 8px;
      background: transparent;
      padding: 0;
      gap: 9px;
    }

    .media-card:hover {
      transform: none;
      background: transparent;
    }

    .media-card:hover .card-cover,
    .media-card:hover .card-fallback {
      filter: brightness(1.12);
      border-color: #5f4482;
    }

    .media-card.selected .card-cover,
    .media-card.selected .card-fallback {
      outline: 2px solid rgba(192, 132, 252, .62);
      outline-offset: 2px;
    }

    .card-cover,
    .card-fallback {
      border-radius: 8px;
      border-color: #20252a;
      box-shadow: 0 16px 38px rgba(0, 0, 0, .32);
      transition: filter .12s ease, border-color .12s ease;
    }

    .card-fallback {
      border-color: #38264e;
      background:
        linear-gradient(135deg, rgba(192, 132, 252, .16), rgba(126, 58, 242, .08)),
        #09070d;
      color: #d8b4fe;
    }

    .card-title {
      font-size: 15px;
      font-weight: 800;
    }

    .card-meta {
      font-size: 12px;
      color: #8b929a;
    }

    .card-check {
      top: 8px;
      right: 8px;
    }

    .track-list {
      gap: 2px;
    }

    .track-row {
      min-height: 56px;
      grid-template-columns: 28px 42px 1fr 76px 86px;
      border-radius: 8px;
      background: transparent;
      border-color: transparent;
      padding: 7px 8px;
    }

    .track-row:hover {
      background: #121519;
      border-color: transparent;
    }

    .track-row.selected {
      background: #1b1226;
      border-color: rgba(192, 132, 252, .30);
    }

    .track-cover {
      border-radius: 6px;
    }

    .track-title {
      font-size: 14px;
      font-weight: 750;
    }

    .track-meta {
      color: #7f8790;
      font-size: 12px;
    }

    .empty,
    .empty-inline {
      border-radius: 8px;
      border-color: #22272d;
      background: #0b0d0f;
    }

    .modal-card {
      border-radius: 8px;
      background: #0d0f12;
      border-color: rgba(192, 132, 252, .28);
    }

    .modal-card input[type="text"]:focus {
      border-color: rgba(192, 132, 252, .72);
      box-shadow: 0 0 0 3px rgba(192, 132, 252, .14);
    }

    body.dragging .drop-target::after {
      border-color: var(--accent);
      background: rgba(192, 132, 252, .08);
      box-shadow: inset 0 0 40px rgba(192, 132, 252, .08);
    }

    .statusbar {
      background: #070809;
      border-top-color: #15181b;
      font-size: 12px;
    }

    #storageText {
      color: #8f969e;
    }

    .app {
      grid-template-rows: 56px minmax(0, 1fr) 86px;
    }

    .playerbar {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(260px, .78fr);
      align-items: center;
      gap: 18px;
      padding: 10px 18px;
      border-top: 1px solid #15181b;
      background: #060708;
      box-shadow: 0 -18px 44px rgba(0, 0, 0, .36);
    }

    .player-track {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-cover,
    .player-fallback {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      border: 1px solid #252a30;
      background: #111318;
      object-fit: cover;
      image-rendering: pixelated;
      flex: 0 0 auto;
    }

    .player-fallback {
      display: grid;
      place-items: center;
      color: var(--accent);
      font-weight: 850;
    }

    .player-fallback[hidden] {
      display: none;
    }

    .player-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .player-copy strong,
    .player-copy span,
    .player-extra span,
    .player-message,
    .player-storage {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-copy strong {
      color: #f6f1ff;
      font-size: 14px;
      font-weight: 850;
    }

    .player-copy span {
      color: #8f969e;
      font-size: 12px;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .player-center {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .player-progress {
      min-width: 0;
      display: grid;
      grid-template-columns: 42px minmax(120px, 1fr) 42px;
      align-items: center;
      gap: 8px;
      color: #8f969e;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .player-progress input[type="range"] {
      width: 100%;
      min-width: 0;
    }

    .control-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 42px;
      height: 38px;
      border-radius: 999px;
    }

    .round-control {
      width: 46px;
      height: 46px;
      padding: 0;
      border-color: #d8b4fe;
      background: #efe4ff;
      color: #170d24;
      box-shadow: 0 10px 28px rgba(192, 132, 252, .28);
    }

    .round-control span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .player-extra {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      color: #8f969e;
      font-size: 12px;
    }

    .player-extra .volume {
      min-width: 178px;
      justify-content: flex-end;
    }

    .player-message,
    .player-storage {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
    }

    .card-play {
      position: absolute;
      right: 10px;
      bottom: 58px;
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 999px;
      border-color: #d8b4fe;
      background: #efe4ff;
      color: #170d24;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .12s ease, transform .12s ease, box-shadow .12s ease;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .34);
      z-index: 3;
    }

    .media-card:hover .card-play,
    .media-card:focus-within .card-play {
      opacity: 1;
      transform: translateY(0);
    }

    .card-play:hover {
      box-shadow: 0 16px 36px rgba(192, 132, 252, .30);
    }

    .track-row {
      cursor: pointer;
    }

    .track-row.playing {
      background: #1b1226;
      border-color: rgba(192, 132, 252, .28);
    }

    @media (max-width: 900px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100vh;
        min-height: 0;
        grid-template-rows: 56px minmax(0, 1fr) 112px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .topbar {
        padding: 0 12px;
      }

      .brand span:last-child {
        display: none;
      }

      .hero {
        min-height: 132px;
        padding: 20px 18px 16px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .folder-cover {
        width: 72px;
        height: 72px;
      }

      .content-scroll {
        padding: 16px;
      }

      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px;
      }

      .track-row {
        grid-template-columns: 28px 38px 1fr 70px;
      }

      .track-kind {
        display: none;
      }

      .playerbar {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px 14px;
        padding: 9px 12px;
      }

      .player-center {
        justify-items: center;
      }

      .player-extra {
        grid-column: 1 / -1;
        justify-content: space-between;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        gap: 8px;
      }

      .now-line {
        display: none;
      }

      .top-nav-pill {
        padding: 0 9px;
      }

      .hero {
        grid-template-columns: 1fr;
        min-height: 124px;
      }

      .folder-cover {
        display: none;
      }

      .toolbar {
        padding: 8px 12px;
      }

      .toolbar button,
      .volume {
        height: 30px;
      }

      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .track-row {
        grid-template-columns: 24px 1fr 58px;
      }

      .track-cover {
        display: none;
      }

      .playerbar {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .player-cover,
      .player-fallback {
        width: 44px;
        height: 44px;
      }

      .control-button span {
        display: none;
      }

      .player-extra #backendText {
        display: none;
      }

      .player-progress {
        grid-template-columns: 36px minmax(76px, 1fr) 36px;
        gap: 6px;
      }

      .player-extra .volume {
        min-width: 0;
        width: 100%;
      }
    }

    /* Retired retro arcade skin retained in source history and intentionally disabled.
    :root {

    .media-card {

    .media-card:hover {

    .card-cover,
    .card-fallback {

    .card-title {

    .track-row {

    .track-row:hover,
    .track-row.playing,
    .track-row.selected {

    .modal::before {
      content: "";
      position: absolute;

    /* Jukebox Design System — OLED v3 production skin. */
    :root {

      z-index: 40;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(4,3,8,.66);
      backdrop-filter: blur(10px);
    }
    .modal[hidden] { display: none; }
    .modal::before { display: none; }
    .modal-card {
      position: relative;
      width: min(440px,100%);
      display: grid;
      gap: 18px;
      padding: 26px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      background: rgba(10,10,12,.94);

      box-shadow: 0 30px 90px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.07);

    .modal-card h2 { margin: 0; color: #fff; font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -.02em; text-transform: none; text-shadow: none; }
    .modal-card p { margin: 0; color: var(--muted); font-size: 13px; }
    .modal-card input[type="text"] { width: 100%; height: 46px; padding: 0 16px; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; outline: none; background: rgba(0,0,0,.35); color: #fff; }
    .modal-card input[type="text"]:focus { border-color: rgba(167,139,250,.5); box-shadow: 0 0 0 3px rgba(167,139,250,.14); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    .drop-target::after { content: ""; pointer-events: none; position: fixed; inset: 76px 20px 92px; z-index: 30; border: 1px dashed transparent; border-radius: 24px; }
    body.dragging .drop-target::after { border-color: var(--accent); background: rgba(167,139,250,.08); box-shadow: inset 0 0 40px rgba(167,139,250,.08); }
    #fileInput { display: none; }

    /* Collapse toolbar copy only when its actual panel is too narrow. */
    @container (max-width: 1033px) {
      .toolbar {
        justify-content: center;
        flex-wrap: nowrap;
        gap: 4px;
        padding: 10px 8px;
        overflow: hidden;
      }
      .toolbar button {
        width: 36px;
        min-width: 36px;
        height: 36px;
        padding: 0;
        gap: 0;
        font-size: 0;
      }
      .toolbar .volume {

        height: 36px;
        justify-content: center;
        gap: 0;
        font-size: 0;
      }
      .toolbar .sep { display: none; }
    }

    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .topbar { padding: 0 28px; gap: 18px; }

    }
    @media (max-width: 900px) {

    }
    @media (max-width: 820px) {

      .player-extra { display: none; }
      .player-center { justify-items: end; }
      .player-progress { display: none; }
      .hero { min-height: 154px; }
      .card-grid { grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); column-gap: 18px; row-gap: 26px; }
      .track-row { grid-template-columns: 28px 40px minmax(0,1fr) 72px; }

      .main-panel.detail-view .hero {

    @media (max-width: 560px) {

      }

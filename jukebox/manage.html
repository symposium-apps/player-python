<script>
const state = {
  status: null,
  tracks: [],
  playlists: [],
  view: { type: "root" },
  webAudioTrackId: "",
  playRequestId: 0,
  scrubbing: false,
  playback: loadBrowserPlayback(),
  lastPlaybackSave: 0
};

const PLAYBACK_STORAGE_KEY = "jukebox.playback.v1";

function defaultBrowserPlayback() {
  return { currentTrackId: "", queue: [], queueName: "Queue", paused: true, volume: 70, position: 0 };
}

function loadBrowserPlayback() {
  try {
    const raw = JSON.parse(localStorage.getItem("jukebox.playback.v1") || "null");
    if (!raw || typeof raw !== "object") return defaultBrowserPlayback();
    return {
      currentTrackId: String(raw.currentTrackId || ""),
      queue: Array.isArray(raw.queue) ? raw.queue.map(String) : [],
      queueName: String(raw.queueName || "Queue"),
      paused: raw.paused !== false,
      volume: Math.max(0, Math.min(100, Number(raw.volume ?? 70))),
      position: Math.max(0, Number(raw.position || 0))
    };
  } catch (_) {
    return defaultBrowserPlayback();
  }
}

function saveBrowserPlayback(force = false) {
  const now = Date.now();
  if (!force && now - state.lastPlaybackSave < 1000) return;
  state.lastPlaybackSave = now;
  localStorage.setItem(PLAYBACK_STORAGE_KEY, JSON.stringify(state.playback));
}

function syncStatusFromBrowser() {
  const current = trackMap().get(String(state.playback.currentTrackId || "")) || null;
  if (!current) {
    state.playback.currentTrackId = "";
    state.playback.position = 0;
  }
  state.status = {
    ...(state.status || {}),
    current_track: current,
    state: {
      ...((state.status && state.status.state) || {}),
      current_track_id: current ? String(current.id) : null,
      queue: state.playback.queue,
      queue_name: state.playback.queueName,
      paused: state.playback.paused,
      volume: state.playback.volume
    }
  };
}

function qs(id) {
  return document.getElementById(id);
}

async function api(path, options = {}) {
  const response = await fetch(path, {
    headers: options.body instanceof FormData ? {} : { "Content-Type": "application/json" },
    ...options
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok || data.ok === false) throw new Error(data.error || response.statusText);
  return data;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#039;"
  }[char]));
}

function fmtSize(bytes) {
  bytes = Number(bytes || 0);
  if (!bytes) return "-";
  const units = ["B", "KB", "MB", "GB", "TB"];
  let value = bytes;
  let unit = 0;
  while (value >= 1024 && unit < units.length - 1) {
    value /= 1024;
    unit++;
  }
  const precision = unit <= 1 ? 0 : 1;
  return `${value.toFixed(precision)} ${units[unit]}`;
}

function fmtDate(epoch) {
  if (!epoch) return "-";
  return new Date(Number(epoch) * 1000).toLocaleString([], {
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function fmtTime(seconds) {
  if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
  const total = Math.floor(seconds);
  const mins = Math.floor(total / 60);
  const secs = String(total % 60).padStart(2, "0");
  return `${mins}:${secs}`;
}

function assetUrl(path) {
  if (!path) return "";
  if (String(path).startsWith("/")) return String(path);
  return String(path).replace(/^..\/assets\//, "/assets/");
}

function mediaUrl(trackId) {
  return `/media/${encodeURIComponent(String(trackId))}`;
}

function msg(text) {
  qs("statusText").textContent = text;
}

function iconSvg(name) {
  const icons = {
    pause: `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14"/><path d="M16 5v14"/></svg>`,
    play: `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>`,
    trash: `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14"/><path d="M9 7V5h6v2"/><path d="M8 10v9"/><path d="M16 10v9"/><path d="M6.5 7l1 14h9l1-14"/></svg>`,
    minus: `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg>`
  };
  return icons[name] || "";
}

function buttonLabel(id, svg, label) {
  qs(id).innerHTML = `${svg}<span>${escapeHtml(label)}</span>`;
}

function trackMap() {
  return new Map(state.tracks.map(track => [String(track.id), track]));
}

function albumName(track) {
  if (track.album) return String(track.album);
  const rel = String(track.relative_path || track.filename || "");
  const parts = rel.split("/");
  return parts.length > 1 ? parts[0] : "Loose Files";
}

function artistName(track) {
  if (track.artist) return String(track.artist);
  const album = albumName(track);
  return album.includes(" - ") ? album.split(" - ")[0].trim() : "";
}

function playlistCoverForAlbum(name, artist = "") {
  const keys = new Set([String(name).toLowerCase()]);
  if (artist) keys.add(`${artist} - ${name}`.toLowerCase());
  const playlist = state.playlists.find(item => keys.has(String(item.name || "").toLowerCase()));
  return playlist ? (playlist.cover || playlist.cover_lcd || playlist.cover_source || "") : "";
}

function albumCoverForTrack(track) {
  return track.album_cover_pixel || track.album_cover_lcd || track.album_cover || playlistCoverForAlbum(albumName(track), artistName(track));
}

function albums() {
  const map = new Map();
  for (const track of state.tracks) {
    const name = albumName(track);
    if (!map.has(name)) map.set(name, []);
    map.get(name).push(track);
  }
  return [...map.entries()]
    .map(([name, tracks]) => {
      const artist = artistName(tracks[0]);
      const coverTrack = tracks.find(track => albumCoverForTrack(track));
      return {
        name,
        tracks,
        artist,
        cover: coverTrack ? albumCoverForTrack(coverTrack) : playlistCoverForAlbum(name, artist)
      };
    })
    .sort((a, b) => a.name.localeCompare(b.name));
}

function playlistBySlug(slug) {
  return state.playlists.find(item => item.slug === slug);
}

function tracksForPlaylist(slug) {
  const playlist = playlistBySlug(slug);
  if (!playlist) return [];
  const byId = trackMap();
  return playlist.track_ids.map(id => byId.get(String(id))).filter(Boolean);
}

function setView(view) {
  state.view = view;
  qs("selectAll").checked = false;
  render();
}

function selectedTrackIds() {
  return [...document.querySelectorAll("[data-track-check]:checked")].map(el => el.value);
}

function selectedPlaylistSlugs() {
  return [...document.querySelectorAll("[data-playlist-check]:checked")].map(el => el.value);
}

function selectedAlbumNames() {
  return [...document.querySelectorAll("[data-album-check]:checked")].map(el => el.value);
}

function selectedAlbumTrackIds() {
  const names = new Set(selectedAlbumNames());
  return albums()
    .filter(album => names.has(album.name))
    .flatMap(album => album.tracks.map(track => String(track.id)));
}

function uploadBlob(item) {
  return item && item.file ? item.file : item;
}

function uploadPath(item) {
  const file = uploadBlob(item);
  return String((item && item.relativePath) || file.webkitRelativePath || file.name || "");
}

function uploadableFiles(files) {
  const allowed = new Set(["mp3", "m4a", "aac", "ogg", "wav", "flac", "jpg", "jpeg", "png", "webp"]);
  return files.filter(item => {
    const file = uploadBlob(item);
    const name = uploadPath(item).toLowerCase();
    const ext = name.includes(".") ? name.split(".").pop() : "";
    return file && file.name && allowed.has(ext);
  });
}

function uploadBatches(files) {
  const maxFiles = 10;
  const maxBytes = 48 * 1024 * 1024;
  const batches = [];
  let batch = [];
  let bytes = 0;
  for (const item of files) {
    const file = uploadBlob(item);
    const size = Number(file.size || 0);
    if (batch.length && (batch.length >= maxFiles || bytes + size > maxBytes)) {
      batches.push(batch);
      batch = [];
      bytes = 0;
    }
    batch.push(item);
    bytes += size;
  }
  if (batch.length) batches.push(batch);
  return batches;
}

async function uploadBatch(files) {
  const form = new FormData();
  for (const item of files) {
    const file = uploadBlob(item);
    const relativePath = uploadPath(item) || file.name;
    form.append("files", file, file.name);
    form.append("relative_paths", relativePath);
  }
  if (state.view.type === "album") form.append("target_album", state.view.name);
  return api("/api/upload", { method: "POST", body: form });
}

async function collectDirectoryHandleFiles(directoryHandle, prefix = directoryHandle.name) {
  const files = [];
  for await (const [name, handle] of directoryHandle.entries()) {
    const relativePath = `${prefix}/${name}`;
    if (handle.kind === "file") {
      files.push({ file: await handle.getFile(), relativePath });
    } else if (handle.kind === "directory") {
      files.push(...await collectDirectoryHandleFiles(handle, relativePath));
    }
  }
  return files;
}

function readAllDirectoryEntries(reader) {
  return new Promise((resolve, reject) => {
    const entries = [];
    function readBatch() {
      reader.readEntries(batch => {
        if (!batch.length) {
          resolve(entries);
          return;
        }
        entries.push(...batch);
        readBatch();
      }, reject);
    }
    readBatch();
  });
}

async function collectEntryFiles(entry, prefix = "") {
  if (!entry) return [];
  const relativePath = `${prefix}${entry.name}`;
  if (entry.isFile) {
    return [await new Promise((resolve, reject) => {
      entry.file(file => resolve({ file, relativePath }), reject);
    })];
  }
  if (!entry.isDirectory) return [];
  const reader = entry.createReader();
  const entries = await readAllDirectoryEntries(reader);
  const nested = await Promise.all(entries.map(item => collectEntryFiles(item, `${relativePath}/`)));
  return nested.flat();
}

async function filesFromDrop(event) {
  const items = [...(event.dataTransfer.items || [])];
  const entries = items.map(item => item.webkitGetAsEntry && item.webkitGetAsEntry()).filter(Boolean);
  if (entries.length) {
    const nested = await Promise.all(entries.map(entry => collectEntryFiles(entry)));
    return nested.flat();
  }
  return [...event.dataTransfer.files].map(file => ({ file, relativePath: file.name }));
}

function visibleTracks() {
  if (state.view.type === "playlist") return tracksForPlaylist(state.view.slug);
  if (state.view.type === "album") {
    const album = albums().find(item => item.name === state.view.name);
    return album ? album.tracks : [];
  }
  return [];
}

function currentQueueIds() {
  return state.playback.queue.map(item => String(item));
}

function queuedTrackId(direction) {
  const queue = currentQueueIds();
  const currentId = state.status?.current_track ? String(state.status.current_track.id) : "";
  if (!queue.length) return "";
  const index = Math.max(0, queue.indexOf(currentId));
  return queue[(index + direction + queue.length) % queue.length] || "";
}

function updateScrubber() {
  const audio = qs("webAudio");
  const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
  const current = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
  qs("elapsedText").textContent = fmtTime(current);
  qs("durationText").textContent = fmtTime(duration);
  qs("scrubSlider").disabled = !duration;
  if (!state.scrubbing) {
    qs("scrubSlider").value = duration ? String(Math.round((current / duration) * 1000)) : "0";
  }
}

function isBrowserPlaybackMode() {
  return true;
}

function isCurrentWebAudioReady() {
  const current = state.status && state.status.current_track;
  return !!(current && state.webAudioTrackId === String(current.id) && qs("webAudio").currentSrc);
}

function isPlaybackPaused() {
  if (!(state.status && state.status.current_track)) return true;
  return qs("webAudio").paused || !isCurrentWebAudioReady();
}

function prepareStoredAudio() {
  const audio = qs("webAudio");
  const current = state.status && state.status.current_track;
  audio.volume = Math.max(0, Math.min(1, Number(state.playback.volume || 70) / 100));
  if (!current) {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    state.webAudioTrackId = "";
    return;
  }
  const id = String(current.id);
  if (state.webAudioTrackId !== id) {
    audio.pause();
    audio.src = mediaUrl(id);
    audio.load();
    state.webAudioTrackId = id;
  }
}

async function playWebAudio(trackId) {
  const audio = qs("webAudio");
  const id = String(trackId);
  audio.pause();
  if (state.webAudioTrackId !== id) {
    audio.src = mediaUrl(id);
    audio.load();
    state.webAudioTrackId = id;
  }
  audio.volume = Math.max(0, Math.min(1, Number(qs("volumeSlider").value || 70) / 100));
  try {
    await audio.play();
    state.playback.paused = false;
    saveBrowserPlayback(true);
  } catch (error) {
    msg("Browser blocked audio. Click Resume once.");
    throw error;
  }
}

function pauseWebAudio() {
  qs("webAudio").pause();
  state.playback.paused = true;
  saveBrowserPlayback(true);
}

function actionQueue(action) {
  const text = String(action || "");
  const splitAt = text.indexOf(":");
  if (splitAt < 0) return { tracks: [], name: "" };
  const kind = text.slice(0, splitAt);
  const value = text.slice(splitAt + 1);
  if (kind === "album") {
    const album = albums().find(item => item.name === value);
    return { tracks: album ? album.tracks : [], name: album ? album.name : "Album" };
  }
  if (kind === "playlist") {
    const playlist = playlistBySlug(value);
    return { tracks: tracksForPlaylist(value), name: playlist ? playlist.name : "Playlist" };
  }
  return { tracks: [], name: "" };
}

async function playAction(action) {
  const queue = actionQueue(action);
  if (!queue.tracks.length) {
    msg("Nothing to play");
    return;
  }
  await playTrack(queue.tracks[0].id, queue.tracks.map(track => String(track.id)), queue.name);
}

function viewTitle() {
  if (state.view.type === "playlists") return "Playlists";
  if (state.view.type === "playlist") return playlistBySlug(state.view.slug)?.name || "Playlist";
  if (state.view.type === "albums") return "Albums";
  if (state.view.type === "album") return state.view.name || "Album";
  return "Your Library";
}

function crumbs() {
  const list = [{ label: "Jukebox", view: { type: "root" } }];
  if (state.view.type === "playlists" || state.view.type === "playlist") {
    list.push({ label: "Playlists", view: { type: "playlists" } });
  }
  if (state.view.type === "playlist") {
    list.push({ label: playlistBySlug(state.view.slug)?.name || "Playlist", view: state.view });
  }
  if (state.view.type === "albums" || state.view.type === "album") {
    list.push({ label: "Albums", view: { type: "albums" } });
  }
  if (state.view.type === "album") {
    list.push({ label: state.view.name || "Album", view: state.view });
  }
  return list;
}

function renderCrumbs() {
  qs("crumbs").innerHTML = crumbs().map((item, index) => `
    ${index ? `<span class="slash">/</span>` : ""}
    <button class="crumb" data-crumb="${index}" type="button">${escapeHtml(item.label)}</button>
  `).join("");
  qs("crumbs").querySelectorAll("[data-crumb]").forEach(button => {
    button.addEventListener("click", () => setView(crumbs()[Number(button.dataset.crumb)].view));
  });
}

function setActiveNav() {
  const active = state.view.type === "album" ? "albums" : state.view.type === "playlist" ? "playlists" : state.view.type;
  document.querySelectorAll("[data-nav]").forEach(button => {
    const nav = button.dataset.nav || "";
    button.classList.toggle("active", nav === active || (active === "root" && nav === "root"));
  });
}

function renderRail() {
  const rail = qs("playlistRail");
  if (!state.playlists.length) {
    rail.innerHTML = `<button class="playlist-mini" id="emptyPlaylistRail" type="button"><span class="mini-fallback">+</span><span><strong>Create one</strong><span>No playlists yet</span></span></button>`;
    qs("emptyPlaylistRail").addEventListener("click", () => qs("newPlaylistBtn").click());
    return;
  }
  rail.innerHTML = state.playlists.map(item => {
    const cover = item.cover || item.cover_lcd || item.cover_source;
    const image = cover
      ? `<img src="${escapeHtml(assetUrl(cover))}" alt="">`
      : `<span class="mini-fallback">PL</span>`;
    return `
      <div class="playlist-mini" data-open="playlist:${escapeHtml(item.slug)}">
        ${image}
        <span><strong>${escapeHtml(item.name)}</strong><span>${Number(item.track_ids?.length || 0)} tracks</span></span>
      </div>
    `;
  }).join("");
}

function renderStatus() {
  if (!state.status) return;
  const current = state.status.current_track;
  const paused = isPlaybackPaused();
  const storage = state.status.storage || {};
  const usedPercent = storage.total ? Math.round(Number(storage.used || 0) / Number(storage.total) * 100) : 0;
  qs("nowLine").textContent = current ? `${paused ? "Paused" : "Playing"}: ${current.name}` : "Nothing loaded";
  qs("playerTitle").textContent = current ? current.name : "Nothing Playing";
  qs("playerMeta").textContent = current
    ? [current.artist, current.album].filter(Boolean).join(" / ") || current.relative_path || "Playing from Jukebox"
    : "Select a track, album, or playlist";
  const currentCover = current ? albumCoverForTrack(current) : "";
  qs("playerCover").hidden = !currentCover;
  qs("playerCover").src = currentCover ? assetUrl(currentCover) : "";
  qs("playerFallback").hidden = !!currentCover;
  buttonLabel("playPauseBtn", iconSvg(paused ? "play" : "pause"), paused ? "Resume" : "Pause");
  qs("volumeSlider").value = state.status.state.volume;
  qs("volumeValue").textContent = state.status.state.volume;
  qs("webAudio").volume = Math.max(0, Math.min(1, Number(state.status.state.volume || 70) / 100));
  qs("storageText").textContent = storage.total
    ? `VPS ${fmtSize(storage.used)} used / ${fmtSize(storage.total)} total | ${fmtSize(storage.free)} free | Jukebox ${fmtSize(storage.jukebox)}`
    : "Storage unknown";
  qs("backendText").textContent = `${usedPercent}% full | ${state.tracks.length} files | ${state.playlists.length} playlists | browser audio`;
}

function sectionBlock(title, meta, body) {
  return `
    <section class="section-block">
      <div class="section-head"><h2>${escapeHtml(title)}</h2><span>${escapeHtml(meta || "")}</span></div>
      ${body || `<div class="empty-inline">Nothing here yet.</div>`}
    </section>
  `;
}

function mediaCard({ name, sub, open, count, cover, checkKind, checkValue, fallback = "AL", playAction = "" }) {
  const art = cover
    ? `<img class="card-cover" src="${escapeHtml(assetUrl(cover))}" alt="">`
    : `<div class="card-fallback">${escapeHtml(fallback)}</div>`;
  const checkbox = checkKind && checkValue
    ? `<input class="card-check" data-${escapeHtml(checkKind)}-check type="checkbox" value="${escapeHtml(checkValue)}" aria-label="Select ${escapeHtml(name)}">`
    : "";
  const playButton = playAction
    ? `<button class="card-play" data-play-action="${escapeHtml(playAction)}" type="button" title="Play ${escapeHtml(name)}">${iconSvg("play")}</button>`
    : "";
  return `
    <article class="media-card" data-open="${escapeHtml(open)}" data-selectable>
      ${checkbox}
      ${art}
      ${playButton}
      <div class="card-title">${escapeHtml(name)}</div>
      <div class="card-meta">${escapeHtml(sub || `${count || 0} tracks`)}</div>
    </article>
  `;
}

function trackRow(track) {
  const playing = state.status?.current_track && String(state.status.current_track.id) === String(track.id);
  const detail = [
    track.artist ? String(track.artist) : "",
    track.album ? String(track.album) : "",
    track.relative_path || track.filename || ""
  ].filter(Boolean).join(" / ");
  const cover = albumCoverForTrack(track);
  const icon = cover
    ? `<img class="track-cover" src="${escapeHtml(assetUrl(cover))}" alt="">`
    : `<span class="track-cover"></span>`;
  return `
    <article class="track-row ${playing ? "playing" : ""}" data-track-row="${escapeHtml(track.id)}" data-selectable>
      <input data-track-check type="checkbox" value="${escapeHtml(track.id)}" aria-label="Select ${escapeHtml(track.name)}">
      ${icon}
      <div>
        <div class="track-title">${escapeHtml(track.name)}</div>
        <div class="track-meta">${escapeHtml(detail)}</div>
      </div>
      <div class="track-kind">${escapeHtml(String(track.extension || "").replace(".", "") || "audio")}</div>
      <div class="track-size">${fmtSize(track.size)}</div>
    </article>
  `;
}

function renderRows() {
  const rows = qs("rows");
  const empty = qs("emptyState");
  const title = viewTitle();
  let hint = `${albums().length} albums / ${state.tracks.length} tracks`;
  let html = "";

  if (state.view.type === "root") {
    const albumCards = albums().map(item => mediaCard({
      name: item.name,
      sub: item.artist ? `${item.artist} / ${item.tracks.length} tracks` : `${item.tracks.length} tracks`,
      count: item.tracks.length,
      cover: item.cover,
      open: `album:${item.name}`,
      fallback: "AL",
      playAction: `album:${item.name}`
    })).join("");
    const playlistCards = state.playlists.map(item => mediaCard({
      name: item.name,
      sub: `${item.track_ids.length} tracks`,
      count: item.track_ids.length,
      cover: item.cover || item.cover_lcd || item.cover_source,
      open: `playlist:${item.slug}`,
      fallback: "PL",
      playAction: `playlist:${item.slug}`
    })).join("") || mediaCard({
      name: "New Playlist",
      sub: "Create a mix from your albums",
      count: 0,
      open: "new-playlist",
      fallback: "+"
    });
    html = [
      sectionBlock("Albums", `${albums().length} available`, `<div class="card-grid">${albumCards}</div>`),
      sectionBlock("Playlists", `${state.playlists.length} created`, `<div class="card-grid">${playlistCards}</div>`)
    ].join("");
  } else if (state.view.type === "playlists") {
    hint = `${state.playlists.length} playlists`;
    html = `<div class="card-grid">` + state.playlists.map(item => mediaCard({
      name: item.name,
      sub: `${item.track_ids.length} tracks`,
      count: item.track_ids.length,
      cover: item.cover || item.cover_lcd || item.cover_source,
      open: `playlist:${item.slug}`,
      checkKind: "playlist",
      checkValue: item.slug,
      fallback: "PL",
      playAction: `playlist:${item.slug}`
    })).join("") + `</div>`;
  } else if (state.view.type === "playlist") {
    const tracks = tracksForPlaylist(state.view.slug);
    hint = `${tracks.length} tracks`;
    html = `<div class="track-list">${tracks.map(trackRow).join("")}</div>`;
  } else if (state.view.type === "albums") {
    hint = `${albums().length} albums`;
    html = `<div class="card-grid">` + albums().map(item => mediaCard({
      name: item.name,
      sub: item.artist ? `${item.artist} / ${item.tracks.length} audio files` : `${item.tracks.length} audio files`,
      count: item.tracks.length,
      cover: item.cover,
      open: `album:${item.name}`,
      checkKind: "album",
      checkValue: item.name,
      fallback: "AL",
      playAction: `album:${item.name}`
    })).join("") + `</div>`;
  } else if (state.view.type === "album") {
    const album = albums().find(item => item.name === state.view.name);
    hint = album ? `${album.artist || "Unknown artist"} / ${album.tracks.length} tracks` : "Album missing";
    html = `<div class="track-list">${(album ? album.tracks : []).map(trackRow).join("")}</div>`;
  }

  rows.className = `library-grid view-${state.view.type}`;
  rows.innerHTML = html;
  qs("folderTitle").textContent = title;
  qs("folderHint").textContent = hint;
  const activePlaylist = state.view.type === "playlist" ? playlistBySlug(state.view.slug) : null;
  const activeAlbum = state.view.type === "album" ? albums().find(item => item.name === state.view.name) : null;
  const cover = activePlaylist
    ? assetUrl(activePlaylist.cover || activePlaylist.cover_lcd || activePlaylist.cover_source)
    : activeAlbum ? assetUrl(activeAlbum.cover) : "";
  const mainPanel = document.querySelector(".main-panel");
  mainPanel.classList.toggle("detail-view", !!cover);
  mainPanel.style.setProperty("--hero-art", cover ? `url("${cover.replace(/"/g, "%22")}")` : "none");
  qs("folderCover").hidden = !cover;
  qs("folderCover").src = cover || "";
  const hasVisibleContent = state.view.type === "root"
    || (state.view.type === "playlists" && state.playlists.length > 0)
    || (state.view.type === "playlist" && tracksForPlaylist(state.view.slug).length > 0)
    || (state.view.type === "albums" && albums().length > 0)
    || (state.view.type === "album" && (activeAlbum?.tracks.length || 0) > 0);
  empty.hidden = hasVisibleContent;
  empty.textContent = state.view.type === "playlist" || state.view.type === "album" ? "Drop music here or use Upload." : "Nothing here yet.";
  bindRows();
  updateActionState();
}

function bindRows() {
  document.querySelectorAll("[data-play-action]").forEach(button => {
    button.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();
      playAction(button.dataset.playAction || "").catch(error => msg(error.message));
    });
  });

  document.querySelectorAll("[data-open]").forEach(row => {
    row.addEventListener("click", event => {
      if (event.target.closest("input, button")) return;
      const open = row.dataset.open || "";
      if (open === "playlists") setView({ type: "playlists" });
      else if (open === "albums") setView({ type: "albums" });
      else if (open === "new-playlist") qs("newPlaylistBtn").click();
      else if (open.startsWith("playlist:")) setView({ type: "playlist", slug: open.slice("playlist:".length) });
      else if (open.startsWith("album:")) setView({ type: "album", name: open.slice("album:".length) });
    });
  });

  document.querySelectorAll("[data-track-row]").forEach(row => {
    row.addEventListener("click", event => {
      if (event.target.closest("input, button")) return;
      const tracks = visibleTracks();
      const queue = tracks.length ? tracks.map(track => String(track.id)) : state.tracks.map(track => String(track.id));
      playTrack(row.dataset.trackRow, queue, viewTitle()).catch(error => msg(error.message));
    });
  });

  document.querySelectorAll("[data-track-check]").forEach(checkbox => {
    checkbox.addEventListener("change", () => {
      checkbox.closest("[data-selectable]").classList.toggle("selected", checkbox.checked);
      updateActionState();
    });
  });

  document.querySelectorAll("[data-playlist-check]").forEach(checkbox => {
    checkbox.addEventListener("change", () => {
      checkbox.closest("[data-selectable]").classList.toggle("selected", checkbox.checked);
      updateActionState();
    });
  });

  document.querySelectorAll("[data-album-check]").forEach(checkbox => {
    checkbox.addEventListener("change", () => {
      checkbox.closest("[data-selectable]").classList.toggle("selected", checkbox.checked);
      updateActionState();
    });
  });
}

function updateActionState() {
  const selected = selectedTrackIds();
  const selectedPlaylists = selectedPlaylistSlugs();
  const selectedAlbums = selectedAlbumNames();
  const inTrackView = state.view.type === "playlist" || state.view.type === "album";
  const inPlaylist = state.view.type === "playlist";
  const inPlaylistList = state.view.type === "playlists";
  const inAlbumList = state.view.type === "albums";
  qs("backBtn").disabled = state.view.type === "root";
  qs("playSelectedBtn").disabled = !selected.length || !inTrackView;
  qs("addToPlaylistBtn").disabled = !selected.length || !inTrackView || !state.playlists.length;
  qs("removeSelectedBtn").disabled = !selected.length || !inPlaylist;
  qs("deleteSelectedBtn").disabled = inPlaylistList
    ? !selectedPlaylists.length
    : inAlbumList ? !selectedAlbums.length : (!selected.length || !inTrackView);
  buttonLabel("deleteSelectedBtn", iconSvg("trash"), inPlaylistList ? "Delete Playlist" : inAlbumList ? "Delete Album" : "Delete File");
  qs("selectAll").disabled = inPlaylistList
    ? !state.playlists.length
    : inAlbumList ? !albums().length : (!inTrackView || !visibleTracks().length);
}

function render() {
  renderCrumbs();
  renderRail();
  setActiveNav();
  renderStatus();
  renderRows();
}

async function refresh({ keepMessage = false } = {}) {
  const [status, library, playlists] = await Promise.all([
    api("/api/status"),
    api("/api/library"),
    api("/api/playlists")
  ]);
  state.status = status;
  state.tracks = library.tracks || [];
  state.playlists = playlists.playlists || [];
  state.playback.queue = state.playback.queue.filter(id => state.tracks.some(track => String(track.id) === String(id)));
  syncStatusFromBrowser();
  prepareStoredAudio();
  if (state.view.type === "playlist" && !playlistBySlug(state.view.slug)) state.view = { type: "playlists" };
  if (state.view.type === "album" && !albums().find(item => item.name === state.view.name)) state.view = { type: "albums" };
  render();
  if (!keepMessage) msg("Ready");
}

async function savePlaylistTracks(playlist, trackIds) {
  await api("/api/playlists/save", {
    method: "POST",
    body: JSON.stringify({ name: playlist.name, track_ids: trackIds })
  });
}

async function uploadFiles(files) {
  files = uploadableFiles(files.filter(item => uploadBlob(item) && uploadBlob(item).name));
  if (!files.length) return;
  const isFolderUpload = files.some(item => uploadPath(item).includes("/"));
  const batches = uploadBatches(files);
  const saved = [];
  const savedAssets = [];
  for (const [index, batch] of batches.entries()) {
    msg(`Uploading ${isFolderUpload ? "folder" : "files"} ${index + 1}/${batches.length}`);
    const result = await uploadBatch(batch);
    saved.push(...(result.saved || []));
    savedAssets.push(...(result.saved_assets || []));
  }

  if (state.view.type === "playlist") {
    const playlist = playlistBySlug(state.view.slug);
    if (playlist) {
      const existing = playlist.track_ids.map(String);
      const added = saved.map(item => String(item.id));
      await savePlaylistTracks(playlist, [...new Set([...existing, ...added])]);
      msg(`Uploaded ${added.length} audio file${added.length === 1 ? "" : "s"} into playlist`);
    }
  } else if (state.view.type === "album") {
    msg("Uploaded into album");
  } else {
    msg(`Uploaded ${saved.length} audio file${saved.length === 1 ? "" : "s"}${savedAssets.length ? ` and ${savedAssets.length} image${savedAssets.length === 1 ? "" : "s"}` : ""}`);
  }
  qs("fileInput").value = "";
  qs("folderInput").value = "";
  await refresh({ keepMessage: true });
}

async function playTrack(trackId, queue, queueName) {
  const requestId = ++state.playRequestId;
  const audio = qs("webAudio");
  audio.pause();
  state.playback.currentTrackId = String(trackId);
  state.playback.queue = (queue || []).map(String);
  state.playback.queueName = String(queueName || "Queue");
  state.playback.paused = false;
  state.playback.position = 0;
  saveBrowserPlayback(true);
  syncStatusFromBrowser();
  let webAudioError = null;
  await playWebAudio(trackId).catch(error => { webAudioError = error; });
  if (requestId !== state.playRequestId) return;
  render();
  updateScrubber();
  msg(webAudioError ? "Browser blocked audio. Click Resume once." : "Playing in browser");
}

async function playSelected() {
  const ids = selectedTrackIds();
  if (!ids.length) return;
  const queue = visibleTracks().map(track => track.id);
  await playTrack(ids[0], queue, viewTitle());
}

function goBack() {
  if (state.view.type === "playlist") setView({ type: "playlists" });
  else if (state.view.type === "album") setView({ type: "albums" });
  else if (state.view.type === "playlists" || state.view.type === "albums") setView({ type: "root" });
}

function openPlaylistModal() {
  qs("playlistNameInput").value = "";
  qs("playlistModal").hidden = false;
  qs("playlistNameInput").focus();
}

function closePlaylistModal() {
  qs("playlistModal").hidden = true;
}

async function createPlaylistFromModal() {
  const name = qs("playlistNameInput").value.trim();
  if (!name) {
    qs("playlistNameInput").focus();
    return;
  }
  const result = await api("/api/playlists/save", {
    method: "POST",
    body: JSON.stringify({ name, track_ids: [] })
  });
  closePlaylistModal();
  await refresh({ keepMessage: true });
  setView({ type: "playlist", slug: result.playlist.slug });
  msg("Playlist created");
}

qs("backBtn").addEventListener("click", goBack);
qs("refreshBtn").addEventListener("click", () => refresh());
qs("lcdBtn").addEventListener("click", () => { window.location.href = "/mini-sym"; });
document.querySelectorAll("[data-nav]").forEach(button => {
  button.addEventListener("click", () => {
    const nav = button.dataset.nav;
    if (nav === "albums") setView({ type: "albums" });
    else if (nav === "playlists") setView({ type: "playlists" });
    else setView({ type: "root" });
  });
});
qs("uploadBtn").addEventListener("click", () => qs("fileInput").click());
qs("uploadFolderBtn").addEventListener("click", async () => {
  if (window.showDirectoryPicker) {
    try {
      const handle = await window.showDirectoryPicker();
      await uploadFiles(await collectDirectoryHandleFiles(handle));
      return;
    } catch (error) {
      if (error && error.name === "AbortError") return;
    }
  }
  qs("folderInput").click();
});
qs("fileInput").addEventListener("change", event => uploadFiles([...event.target.files]));
qs("folderInput").addEventListener("change", event => uploadFiles([...event.target.files].map(file => ({
  file,
  relativePath: file.webkitRelativePath || file.name
}))));
qs("playSelectedBtn").addEventListener("click", playSelected);

document.querySelectorAll(".new-playlist-trigger").forEach(button => {
  button.addEventListener("click", openPlaylistModal);
});
qs("cancelPlaylistBtn").addEventListener("click", closePlaylistModal);
qs("createPlaylistBtn").addEventListener("click", () => createPlaylistFromModal().catch(error => msg(error.message)));
qs("playlistNameInput").addEventListener("keydown", event => {
  if (event.key === "Enter") {
    event.preventDefault();
    createPlaylistFromModal().catch(error => msg(error.message));
  }
  if (event.key === "Escape") closePlaylistModal();
});
qs("playlistModal").addEventListener("click", event => {
  if (event.target === qs("playlistModal")) closePlaylistModal();
});

qs("addToPlaylistBtn").addEventListener("click", async () => {
  const ids = selectedTrackIds();
  if (!ids.length || !state.playlists.length) return;
  const choice = prompt(`Add to playlist:\n${state.playlists.map((item, index) => `${index + 1}. ${item.name}`).join("\n")}`);
  const index = Number(choice) - 1;
  const playlist = state.playlists[index];
  if (!playlist) return;
  await savePlaylistTracks(playlist, [...new Set([...playlist.track_ids.map(String), ...ids])]);
  await refresh({ keepMessage: true });
  setView({ type: "playlist", slug: playlist.slug });
  msg("Added to playlist");
});

qs("removeSelectedBtn").addEventListener("click", async () => {
  if (state.view.type !== "playlist") return;
  const ids = new Set(selectedTrackIds());
  const playlist = playlistBySlug(state.view.slug);
  if (!ids.size || !playlist) return;
  await savePlaylistTracks(playlist, playlist.track_ids.map(String).filter(id => !ids.has(id)));
  await refresh({ keepMessage: true });
  msg("Removed from playlist");
});

qs("deleteSelectedBtn").addEventListener("click", async () => {
  if (state.view.type === "playlists") {
    const slugs = selectedPlaylistSlugs();
    if (!slugs.length) return;
    if (!confirm(`Delete ${slugs.length} playlist${slugs.length === 1 ? "" : "s"}? Audio files stay in Jukebox.`)) return;
    await api("/api/playlists/delete", {
      method: "POST",
      body: JSON.stringify({ slugs })
    });
    await refresh({ keepMessage: true });
    msg("Deleted playlist");
    return;
  }

  if (state.view.type === "albums") {
    const albumNames = selectedAlbumNames();
    const trackIds = selectedAlbumTrackIds();
    if (!albumNames.length) return;
    if (!confirm(`Delete ${albumNames.length} album${albumNames.length === 1 ? "" : "s"}? This deletes the album audio/art files from Jukebox and removes those songs from playlists.`)) return;
    await api("/api/albums/delete", {
      method: "POST",
      body: JSON.stringify({ albums: albumNames, track_ids: trackIds })
    });
    await refresh({ keepMessage: true });
    msg("Deleted album");
    return;
  }

  const ids = selectedTrackIds();
  if (!ids.length) return;
  if (!confirm(`Delete ${ids.length} audio file${ids.length === 1 ? "" : "s"} from Jukebox?`)) return;
  await api("/api/delete", {
    method: "POST",
    body: JSON.stringify({ track_ids: ids })
  });
  await refresh({ keepMessage: true });
  msg("Deleted file");
});

async function togglePlayback() {
  if (!(state.status && state.status.current_track) && state.tracks.length) {
    await playTrack(state.tracks[0].id, state.tracks.map(track => String(track.id)), "All Songs");
    return;
  }
  const paused = !isPlaybackPaused();
  if (paused) {
    pauseWebAudio();
  } else if (state.status?.current_track) {
    await playWebAudio(state.status.current_track.id);
  }
  state.playback.paused = paused;
  saveBrowserPlayback(true);
  syncStatusFromBrowser();
  render();
  updateScrubber();
}

qs("playPauseBtn").addEventListener("click", () => togglePlayback().catch(error => msg(error.message)));

async function stepPlayback(direction) {
  const nextId = queuedTrackId(direction);
  if (!nextId) return;
  await playTrack(nextId, currentQueueIds(), state.status?.state?.queue_name || "Queue");
}

qs("prevBtn").addEventListener("click", () => stepPlayback(-1).catch(error => msg(error.message)));

qs("nextBtn").addEventListener("click", () => stepPlayback(1).catch(error => msg(error.message)));

qs("volumeSlider").addEventListener("change", async event => {
  state.playback.volume = Number(event.target.value);
  saveBrowserPlayback(true);
  syncStatusFromBrowser();
  renderStatus();
});

qs("volumeSlider").addEventListener("input", event => {
  qs("volumeValue").textContent = event.target.value;
  qs("webAudio").volume = Math.max(0, Math.min(1, Number(event.target.value) / 100));
  state.playback.volume = Number(event.target.value);
});

qs("scrubSlider").addEventListener("input", event => {
  const audio = qs("webAudio");
  const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
  state.scrubbing = true;
  qs("elapsedText").textContent = fmtTime(duration * (Number(event.target.value) / 1000));
});

qs("scrubSlider").addEventListener("change", event => {
  const audio = qs("webAudio");
  const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
  if (duration) audio.currentTime = duration * (Number(event.target.value) / 1000);
  state.playback.position = audio.currentTime;
  saveBrowserPlayback(true);
  state.scrubbing = false;
  updateScrubber();
});

qs("webAudio").addEventListener("ended", () => {
  stepPlayback(1).catch(error => msg(error.message));
});

qs("webAudio").addEventListener("error", () => {
  msg("Browser audio could not load that track");
});

qs("webAudio").addEventListener("loadedmetadata", () => {
  const audio = qs("webAudio");
  if (state.playback.position > 0 && Number.isFinite(audio.duration)) {
    audio.currentTime = Math.min(state.playback.position, Math.max(0, audio.duration - 0.25));
  }
  updateScrubber();
});

["durationchange", "timeupdate", "play", "pause", "seeking", "seeked"].forEach(eventName => {
  qs("webAudio").addEventListener(eventName, () => {
    updateScrubber();
    if (eventName === "timeupdate") {
      state.playback.position = Number(qs("webAudio").currentTime || 0);
      saveBrowserPlayback();
    }
  });
});

qs("selectAll").addEventListener("change", event => {
  const selector = state.view.type === "playlists"
    ? "[data-playlist-check]"
    : state.view.type === "albums" ? "[data-album-check]" : "[data-track-check]";
  document.querySelectorAll(selector).forEach(checkbox => {
    checkbox.checked = event.target.checked;
    checkbox.closest("[data-selectable]").classList.toggle("selected", checkbox.checked);
  });
  updateActionState();
});

document.body.addEventListener("dragover", event => {
  event.preventDefault();
  document.body.classList.add("dragging");
});

document.body.addEventListener("dragleave", event => {
  if (!event.relatedTarget) document.body.classList.remove("dragging");
});

document.body.addEventListener("drop", async event => {
  event.preventDefault();
  document.body.classList.remove("dragging");
  uploadFiles(await filesFromDrop(event));
});

window.addEventListener("keydown", event => {
  if (event.target && ["INPUT", "TEXTAREA"].includes(event.target.tagName)) return;
  if (event.key === "Backspace") {
    event.preventDefault();
    goBack();
  }
  if (event.key === "Delete") qs("deleteSelectedBtn").click();
  if (event.key === "Enter") playSelected();
  if (event.key.toLowerCase() === "r") refresh();
});

refresh().catch(error => {
  msg(error.message);
  qs("rows").innerHTML = "";
  qs("emptyState").hidden = false;
  qs("emptyState").textContent = error.message;
});
</script>
</body>
</html>
